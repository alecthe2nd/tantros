category.environment = Environments

planet.tantros.name = Tantros
campaign.tantros = A planet of unending sea, with only a few useless islands of dry land. Controlled by the [Blue Team], another shard of the Precursors. Like Serpulo in content, but requires workarounds learned from Erekir for the higher-pressure, low-oxygen aquatic environment.

bar.pressure = Pressure: {0} atm

liquid.tantros-steam.name = Steam
liquid.tantros-steam.description = Evaporated water. Used to power turbines or supply pressure.

block.tantros-copper-bulkhead.name = Copper Bulkhead
block.tantros-copper-bulkhead.description = Protects structures from enemy projectiles, and doubles as an artificial seawall.

block.tantros-copper-bulkhead-large.name = Large Copper Bulkhead
block.tantros-copper-bulkhead-large.description = Protects structures from enemy projectiles, and doubles as an artificial seawall.

block.tantros-copper-duct.name = Copper Duct
block.tantros-copper-duct.description = Moves items forward. Only capable of storing a single item. Maintains an inert internal environment to prevent corruption of valuable materials.

block.tantros-copper-duct-router.name = Copper Duct Router
block.tantros-copper-duct-router.description = Distributes items equally across three directions. Only accepts items from the back side. Can be configured as an item sorter.

block.tantros-copper-duct-bridge.name = Copper Duct Bridge
block.tantros-copper-duct-bridge.description = Moves items over structures and terrain.

block.tantros-copper-overflow-duct.name = Copper Overflow Duct
block.tantros-copper-overflow-duct.description = Only outputs items to the sides if the front path is blocked.

block.tantros-copper-underflow-duct.name = Copper Underflow Duct
block.tantros-copper-underflow-duct.description = Opposite of an overflow duct. Outputs to the front if the left and right paths are blocked.

block.tantros-copper-duct-unloader.name = Copper Duct Unloader
block.tantros-copper-duct-unloader.description = Unloads the selected item from the block behind it. Cannot unload from cores.

block.tantros-pneumatic-duct.name = Pneumatic Duct
block.tantros-pneumatic-duct.description = Moves items forward. Only capable of storing a single item. Maintains an inert internal environment to prevent corruption of valuable materials. Faster than a Copper Duct. Compatible with Pneumatic Pump boosters.

block.tantros-pneumatic-duct-router.name = Pneumatic Duct Router
block.tantros-pneumatic-duct-router.description = Distributes items equally across three directions. Only accepts items from the back side. Can be configured as an item sorter. Faster than a Copper Duct Router. Compatible with Pneumatic Pump boosters.

block.tantros-pneumatic-duct-bridge.name = Pneumatic Duct Bridge
block.tantros-pneumatic-duct-bridge.description = Moves items over structures and terrain.  Faster than a Copper Duct Bridge. Compatible with Pneumatic Pump boosters.

block.tantros-copper-pipeline.name = Copper Pipeline
block.conduit.description = Moves fluids forward.

block.tantros-copper-pipeline-router.name = Copper Pipeline Router
block.tantros-copper-pipeline-router.description = Distributes fluids equally across three directions. Only accepts items from the back side.

block.tantros-copper-pipeline-bridge.name = Copper Pipeline Bridge
block.tantros-copper-pipeline-bridge.description = Transports fluids over structures and terrain.


block.tantros-copper-liquid-container.name = Copper Liquid Container
block.tantros-copper-liquid-container.description = Stores a sizeable amount of fluids.


block.tantros-copper-liquid-tank.name = Copper Liquid Tank
block.tantros-copper-liquid-tank.description = Stores a large amount of fluids.


block.tantros-copper-liquid-silo.name = Copper Liquid Silo
block.tantros-copper-liquid-silo.description = Stores a massive amount of fluids.

block.tantros-graphitic-decomposer.name = Decomposition Chamber
block.tantros-graphitic-decomposer.description = Heats up materials to decompose them into simpler forms. Requires power.

block.tantros-metaglass-annealer.name = Annealer
block.tantros-metaglass-annealer.description = Extrudes large, slowly cooled batches of alloys and pseudo-alloys.

block.tantros-nanostructure-weaver.name = Nanostructure Synthesizer
block.tantros-nanostructure-weaver.description = A complex factory for producing complex nanomaterials.

block.tantros-silicon-pressure-smelter.name = Arc Furnace
block.tantros-silicon-pressure-smelter.description = Reduces and refines material via electrical arcs.

block.tantros-sealed-electric-heater.name = Sealed Electric Heater
block.tantros-sealed-electric-heater.description = Generates heat inefficiently via electrical heater coils. Requires power.
block.tantros-sealed-electric-heater.details = Useful for improving factory efficiency, but not much else.

block.tantros-combustion-heater.name = Combustion Heater
block.tantros-combustion-heater.description = Combusts various flammable materials with ozone to produce heat.
block.tantros-combustion-heater.details = Key to early power systems when ozone sources are abundant.

block.tantros-hydrogen-catalysis-heater.name = Catalysis Heater
block.tantros-hydrogen-catalysis-heater.description = Thoroughly hydrogenates materials to produce heat.
block.tantros-hydrogen-catalysis-heater.details = Key to early power systems in the deep.

block.tantros-oxidization-heater.name = Oxidization Reactor
block.tantros-oxidization-heater.description = Violently oxidizes material with ozone to produce heat. Often produces byproducts.

block.tantros-electrolysis-chamber.name = Electrolysis Chamber
block.tantros-electrolysis-chamber.description = Electrolyzes material into simpler forms. Requires power.
block.tantros-electrolysis-chamber.details = Less efficient than electrolysis on Erekir, due to Tantros's comparatively cooler temperatures.

block.tantros-silt-sifter.name = Silt Sifter
block.tantros-silt-sifter.description = Sweeps up sand from sandy floors in aquatic environments.

block.tantros-copper-bore.name = Copper Bore
block.tantros-copper-bore.description = Inefficiently drills wall ores at short range.

block.tantros-deep-bore-drill.name = Deep Bore Drill
block.tantros-deep-bore-drill.description = Bores deep into the crust to find subterranean ores. Requires hydrogen to protect resources from the aquatic environment.

block.tantros-seawater-intake.name = Seawater Intake
block.tantros-seawater-intake.description = Extracts and purifies water from the surrounding environment.

block.tantros-effervescence-collector.name = Effervescence Collector
block.tantros-effervescence-collector.description = Gathers dissolved gasses from aquatic environments.

block.tantros-atmosphere-projector.name = Atmosphere Projector
block.tantros-atmosphere-projector.description = Pushes back the ocean and projects an artificial atmosphere environment with inputted gas. Requires power.
block.tantros-atmosphere-projector.details = Be aware of the range of this device. Many aquatic devices rely on the surrounding water.

block.tantros-deep-sonar.name = Deep Sonar Sensor
block.tantros-deep-sonar.description = Gradually uncovers terrain and enemy units in a large radius. Reveals underground ores and burrowing enemies. Requires power.

block.tantros-pneumatic-pump.name = Pneumatic Pump
block.tantros-pneumatic-pump.description = Boosts Pneumatic Duct speed via pressurized Hydrogen gas.

block.tantros-sealed-node.name = [Placeholder] Power Node
block.tantros-sealed-node.description = A placeholder power node.
block.tantros-sealed-node.details = bleh.

block.tantros-tidal-turbine.name = Tidal Turbine
block.tantros-tidal-turbine.description = Generates power from the ambient ebb and flow of the tides.
block.tantros-tidal-turbine.details = An egregious waste of space. Replace this as soon as you can.

block.tantros-steam-turbine.name = Small Steam Turbine
block.tantros-steam-turbine.description = Uses high pressure steam input to generate power.

block.tantros-steam-dynamo.name = Steam Dynamo
block.tantros-steam-dynamo.description = Uses high pressure steam input to generate power. More efficient than the Small Steam Turbine.


block.tantros-small-unit-assembler.name = Unit Assembler
block.tantros-small-unit-assembler.description = Assembles tier 0 Delegate units. Modules enable assembly of units up to tier 2.

block.tantros-small-mech-assembly-module.name = Small Mech Assembly Module
block.tantros-small-mech-assembly-module.description = Enables specialized assembly of tier 1 mech units.

block.tantros-small-explosive-assembly-module.name = Small Explosive Assembly Module
block.tantros-small-explosive-assembly-module.description = Enables specialized assembly of tier 1 explosive units.

block.tantros-bident.name = Bident
block.tantros-bident.description = Fires alternating bullets at enemies.
block.tantros-bident.details = A modified Duo turret. Despite attempts to adapt it to Tantros, the drag of aquatic environments hampers its effectiveness.\n\nIn Duo We Trust

block.tantros-puncture.name = Puncture
block.tantros-puncture.description = Fires piercing bullets at enemy targets.
block.tantros-puncture.details = A modified Breach turret. Adaptations to aquatic environments were largely successful, allowing for reduced footprint. Suffers the same aquatic drag as other projectile turrets.

unit.tantros-enact.name = Enact
unit.tantros-enact.description = Poorly adapted but submersible core unit.
unit.tantros-enact.detail = Poorly adapted is an understatement. So.... Slow....

unit.tantros-delegate.name = Delegate
unit.tantros-delegate.description = Inefficient. Cheap. Expendable. Can be built upon to assemble assault units, or just used for labor.
unit.tantros-delegate.details = Designs show great effort was made to maximize unit intelligence. These attempts were apparently fruitless.

unit.tantros-flak.name = Flak
unit.tantros-flak.description = A hydrodynamic mech built for sprinting past enemy lines.
unit.tantros-flak.details = Another grand plagiarism, this time of the Dagger. Most of its armor and armament were removed to improve maneuverability. A pity.

unit.tantros-sherd.name = Sherd
unit.tantros-sherd.description = Sturdy mech firing shrapnel shot.
unit.tantros-sherd.details = Four legs proved more effective at keeping the unit upright at the cost of maneuverability. Better slow treading than defeat because the army was blown over.

unit.tantros-fractoid.name = Fractoid
unit.tantros-fractoid.description = Sturdy mech/walker TODO.
unit.tantros-fractoid.details = A significant improvement on the four legged design. Finally mere walls won't stand in our way.


team.blue.name = Archae


sector.tantros-embark.name = Embark
sector.tantros-embark.description = The site selected for splashdown of the :sharded:[accent]Sharded[] conquest of Tantros. Research the basics, and master them.

embark.teachCopper = :copper: [accent]Copper[] is your most basic resource.\nIt forms the basis of nearly everything you can build.\n\nAs such, you must find deposits to mine.\nUse [accent][[WASD] to move.
embark.mineCopper = This is copper ore in a wall.\n\nClick it to mine :copper: [accent]Copper[].
embark.mineCopper.mobile = This is copper ore in a wall.\n\nTap it to mine :copper: [accent]Copper[].
embark.teachBore = It will not do to spend all your time mining.\n\nResearch and place a [fico-mechanical-bore] [accent]Copper Bore[] to mine for you.
embark.researchBore = Open the :tree: tech tree.\nResearch, then place a [fico-mechanical-bore] [accent]Copper Bore[] against the wall ore.\nThis automatically mines resources from walls.
embark.teachDuct = Research and place [fico-copper-duct] [accent]Copper Ducts[] to move the mined resources from the copper bore to the core.\n\nClick and drag to place multiple ducts.\n[accent]Scroll[] to rotate.
embark.teachDuct.mobile = Research and place [fico-copper-duct] [accent]Copper Ducts[] to move the mined resources\nfrom drills to the core.\n\nHold down your finger for a second and drag to place multiple conveyors.
embark.teachOxide = On its own, copper is weak and cannot support large structures.\nScans suggest there should be :oxide: [accent]Oxide[] nearby,\nwhich can support and protect it in larger constructions.\n\nFind deposits to mine.
embark.mineOxide = The scans were correct, this wall has oxide in it.\n\nUse bores to mine the :oxide: [accent]Oxide[].\nUse ducts to feed it into the core.

embark.announceWaves = Your arrival has not gone unnoticed.\nThe [accent]Archae[] have sent a 5 wave scouting party to investigate your arrival and destroy your core.\nTop priority should be survival.\nHead further up to find a good spot to defend yourself.
embark.teachWalls = This pass should be a good place to set up defenses.\n\nResearch and place [fico-copper-bulkhead] [accent]Copper Bulkheads[] from wall to wall on each path in the fork\nto prevent the enemy from getting to your core.
embark.teachDefense = Next, we must destroy the enemies before they breach the walls.\n[fico-bident][accent]Bidents[] are turrets that automatically fire bullets\nat units, so long as they have ammo.\n\nResearch and place Bidents along the inside of your walls,\nand feed Copper or Oxide into them with ducts and duct routers.
embark.pointToAmmo = :copper: [accent]Copper[] from this deposit can act as ammo for your turrets.
embark.teachRepair = Here they come!\nAs each wave comes to your walls, it will take damage from their bullets\nYou can repair damaged walls by holding [accent]Left Click[] on them, and you can rebuild destroyed buildings by\nselecting where they used to be via the [accent]B key[].\n\n Make sure to build up your defenses! Each wave is stronger than the last.
embark.teachRepair.mobile = Here they come!\nAs each wave comes to your walls, it will take damage from their bullets\nYou can repair damaged walls by holding you finger on them, and you can rebuild destroyed buildings by\nselecting where they used to be with the :copy: copy button into the :wrench: rebuild repair option selected.\n\n Make sure to build up your defenses! Each wave is stronger than the last.

embark.teachLead = Scans indicate :lead: [accent]Lead[] in this area.\nIt is an inert, dense metal, useful for making watertight seals and power infrastructure.\nAs such, you must mine these deposits.
embark.mineLead = This is lead ore in a wall.\n\nUse bores to mine the :lead: [accent]Lead[].\nUse ducts to feed it into the core.
embark.teachMetaglass = Lead unlocks new possibilities, though it only gets more complicated from here.\nMetaglass is a lightweight, inert material used in liquid transport in other environments,\nand is critical to keep seawater at bay on Tantros.\n\nResearch and place a [fico-metaglass-annealer] [accent]Annealer[].\nRoute :lead: [accent]Lead[] into the Annealer with ducts.
embark.teachSand = Metaglass requires :lead: [accent]Lead[] and :sand: [accent]Sand[].\nTo obtain sand, you must use [fico-silt-sifter] [accent]Silt Sifters[] to harvest it from sandy seafloors.
embark.siftSand = This is a sand deposit. Sifters can dredge up :sand: [accent]Sand[] from it.\n\nResearch and place [fico-silt-sifter] [accent]Silt Sifters[] to gather sand.\nUse ducts to feed it into the Annealer.
embark.teachPower = The annealer needs [accent]Power[] to melt the lead and sand. To make that power, you need a power source.\nThankfully, the slow movements of the sea itself can power your devices (albeit inefficiently) using a [fico-tidal-turbine] [accent]Tidal Turbine[].\n\nResearch and place two [fico-tidal-turbine] [accent]Tidal Turbines[].\n[Note] Tidal Turbines are large structures, make sure you have the room to place them.
embark.teachPowerNode = Now that you have a turbine built, you need to connect it to the annealer via power nodes.\n[fico-sealed-node] [accent]Sealed Power Nodes[] will automatically connect to buildings (including other nodes) in range and transmit power from power sources.\n\nResearch and place [fico-sealed-power-node] [accent]Sealed Power Nodes[] to form a line leading from the turbine to the annealer.
embark.moveMetaglass = Like for other items, you cannot build with the metaglass until its in the core.\n\nMove produced :metaglass: [accent]Metaglass[] into the core with ducts.

embark.prepareForBattle = Seems like another attacking force is on its way.\nEstimates suggest it will be another 5-10 waves; best to prepare for the worst.\n\nPrepare for the incoming waves.\n\nHint: Bidents deal more damage and have longer range when firing metaglass than for other ammo types.
embark.prepareTimer = [accent]Time left to prepare: [lightgray]{0}

old-reef.mineCoal = The reef walls are carbon-rich under the :bluemat: [accent]Bluemat[], with revealed :coal: [accent]Coal[].\n\n Mine it with bores, and feed it into a [fico-graphitic-decomposer] Decomposition Chamber to produce :graphite: [accent]Graphite[].\nDon't forget to supply power!
old-reef.siliconProduction.itemSupply = In order to construct advanced conquest tools, we need :silicon: [accent]Silicon[].\n\n Build an [fico-arc-furnace] Arc Furnace and supply it with :sand: Sand and :coal: Coal.\nIt also needs :hydrogen: [accent]Hydrogen[], but we will get to that soon.
old-reef.siliconProduction.liquidSupply = Silicon production also needs :hydrogen: Hydrogen. You currently have two options:\n\n[accent]Research and build the [fico-effervescence-collector]Effervescence Collecter[] on :bluemat: [accent]Bluemat[]\n\nOr\n\nUse the leftover hydrogen gas from graphite production.\n\nThe choice is yours.\n\nHint: Use [fico-copper-pipeline] Copper Pipelines to move fluids like Hydrogen.
old-reef.delegateProduction = Here lies a curious device. You may have already noticed that you can research it.\nWhen you aren't busy with the enemies, let's see if you can determine its purpose.