liquid.tantros-steam.name = Steam


block.tantros-copper-bulkhead.name = Copper Bulkhead
block.tantros-copper-bulkhead.description = Protects structures from enemy projectiles, and doubles as an artificial seawall.

block.tantros-copper-bulkhead-large.name = Large Copper Bulkhead
block.tantros-copper-bulkhead-large.description = Protects structures from enemy projectiles, and doubles as an artificial seawall.

block.tantros-copper-duct.name = Copper Duct
block.tantros-copper-duct.description = Moves items forward. Only capable of storing a single item. Maintains an inert internal environment to prevent corruption of valuable materials.

block.tantros-copper-duct-router.name = Copper Duct Router
block.tantros-copper-duct-router.description = Distributes items equally across three directions. Only accepts items from the back side. Can be configured as an item sorter.

block.tantros-copper-duct-bridge.name = Copper Duct Bridge
block.tantros-copper-duct-bridge.description = Moves items over structures and terrain.

block.tantros-pneumatic-duct.name = Pneumatic Duct
block.tantros-pneumatic-duct.description = Moves items forward. Only capable of storing a single item. Maintains an inert internal environment to prevent corruption of valuable materials. Faster than a Copper Duct. Compatible with Pneumatic Pump boosters.

block.tantros-graphitic-decomposer.name = Graphitic Decomposer
block.tantros-graphitic-decomposer.description = Heats up coal to decompose it into pressable carbon and hydrogen gas byproduct.

block.tantros-metaglass-annealer.name = Metaglass Annealer
block.tantros-metaglass-annealer.description = Extrudes large, slowly cooled metaglass batches from molten sand and lead.

block.tantros-silt-sifter.name = Silt Sifter
block.tantros-silt-sifter.description = Sweeps up sand from sandy floors in aquatic environments.

block.tantros-seawater-intake.name = Seawater Intake
block.tantros-seawater-intake.description = Extracts water from the surrounding environment.

block.tantros-atmosphere-projector.name = Atmosphere Projector
block.tantros-atmosphere-projector.description = Pushes back the ocean and projects an artificial atmosphere environment with inputted gas.

block.tantros-deep-sonar.name = Deep Sonar Sensor
block.tantros-deep-sonar.description = Gradually uncovers terrain and enemy units in a large radius. Reveals underground ores and burrowing enemies. Requires power.

block.tantros-pneumatic-pump.name = Pneumatic Pump
block.tantros-pneumatic-pump.description = Boosts Pneumatic Duct speed via pressurized Hydrogen gas.