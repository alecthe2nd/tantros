error.tantros-metaglass-annealing.name = Metaglass Annealing
error.tantros-metaglass-annealing.description = The process by which sand and lead is melted down, mixed, and cooled slowly in large sheets.
error.tantros-surge-annealing.name = Surge Annealing
error.tantros-surge-annealing.description = The process by which copper, lead, titanium, and silicon is melted down, mixed, and cooled slowly in large sheets.
error.tantros-slag-surge-annealing.name = Slag Surge Annealing
error.tantros-slag-surge-annealing.description = The process by which silicon is melted down, mixed with slag, and cooled slowly in large sheets.
error.tantros-coal-decomposition.name = Coal Decomposition
error.tantros-coal-decomposition.description = The process by which coal is heated until it breaks down into graphite and hydrogen gas.
error.tantros-silicon-pressure-smelting.name = Pressurized Silicon Arc Smelting
error.tantros-coal-combustion.name = Coal Combustion
error.tantros-hydrogen-combustion.name = Hydrogen Combustion
error.tantros-electric-heating.name = Electric Heating
error.tantros-silicon-weaving.name = Silicon Weave Reduction
error.tantros-silicon-weaving.description = The process by which sand is forcefully reduced while being worked and weaved in the presence of hydrogen gas. Produces large quantities of highly pure silicon.
error.tantros-phase-weaving.name = Phase Fabric Synthesis
error.tantros-phase-weaving.description = The process by which the atoms in ozone, sand, and thorium are nanoscopically assembled into a highly quantized and carefully doped thorosilicate lattice known as Phase Fabric.

