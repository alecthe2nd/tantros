planet.tantros.name = Tantros
campaign.tantros = A planet of unending sea, with no traces of dry land. Controlled by the :archae: [blue]Archae[], another shard of the Precursors. Like Serpulo in content, but requires workarounds learned from Erekir for the higher-pressure, low-oxygen aquatic environment.

bar.pressure = Pressure: {0} atm

item.tantros-bluecyst.name = Bluecyst
item.tantros-bluecyst.description = Used as a replacement carbon source, hydrogen source, and for conversion to oil.
item.tantros-bluecyst.details = Electrolyzing Spore variant. Likely a synthetic life form. Emits hydrogen gas. Seems in balance with the Tantros ecosystem. Highly flammable in oxygenated conditions.

item.tantros-redcyst.name = Redcyst
item.tantros-redcyst.description = Used as an :ozone: [accent]Ozone[] source, and as a mild explosive.
item.tantros-redcyst.details = Electrolyzing Spore variant. Likely a synthetic life form. Emits ozone gas. Seems in balance with the Tantros ecosystem. Explosively flammable by itself, due to stored ozone.

liquid.tantros-steam.name = Steam
liquid.tantros-steam.description = Evaporated water. Used to power turbines or supply pressure.
liquid.tantros-steam.details = Forms at high pressure and extremely explosive.


