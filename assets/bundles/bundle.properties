#content
block.tantros-copper-bulkhead.name = Copper Bulkhead
block.tantros-copper-bulkhead.description = Protects structures from enemy projectiles, and doubles as an artificial seawall. Takes additional damage from energy attacks.
block.tantros-copper-bulkhead.details = Thankfully, pressure does very little to defensive metal lumps of this size.

block.tantros-copper-bulkhead-large.name = Large Copper Bulkhead
block.tantros-copper-bulkhead-large.description = Protects structures from enemy projectiles, and doubles as an artificial seawall. Takes additional damage from energy attacks.
block.tantros-copper-bulkhead-large.details = Thankfully, pressure does very little to defensive metal lumps of this size.

block.tantros-lead-bulkhead.name = Leaden Bulkhead
block.tantros-lead-bulkhead.description = Protects structures from enemy projectiles, and doubles as an artificial seawall. Denser and less prone to energy than a Copper Bulkhead.
block.tantros-lead-bulkhead.details = Terrible for the local ecosystem.

block.tantros-lead-bulkhead-large.name = Large Leaden Bulkhead
block.tantros-lead-bulkhead-large.description = Protects structures from enemy projectiles, and doubles as an artificial seawall. Denser and less prone to energy than a Large Copper Bulkhead.
block.tantros-lead-bulkhead-large.details = Terrible for the local ecosystem.

block.tantros-metaglass-bulkhead.name = Glassy Bulkhead
block.tantros-metaglass-bulkhead.description = Protects structures from enemy projectiles, and doubles as an artificial seawall. Resistant to energy attacks and blocks lasers and power node connections.
block.tantros-metaglass-bulkhead.details = Metaglass alone cannot handle the stress of undersea pressure, so an oxide base is necessary.

block.tantros-metaglass-bulkhead-large.name = Large Glassy Bulkhead
block.tantros-metaglass-bulkhead-large.description = Protects structures from enemy projectiles, and doubles as an artificial seawall. Resistant to energy attacks and blocks lasers and power node connections.
block.tantros-metaglass-bulkhead-large.details = Metaglass alone cannot handle the stress of undersea pressure, so an oxide base is necessary.


block.tantros-copper-duct.name = Copper Duct
block.tantros-copper-duct.description = Moves items forward. Only capable of storing a single item. Maintains an inert internal environment to prevent corruption of valuable materials.

block.tantros-copper-duct-router.name = Copper Duct Router
block.tantros-copper-duct-router.description = Distributes items equally across three directions. Only accepts items from the back side. Can be configured as an item sorter.

block.tantros-copper-duct-bridge.name = Copper Duct Bridge
block.tantros-copper-duct-bridge.description = Moves items over structures and terrain.

block.tantros-copper-overflow-duct.name = Copper Overflow Duct
block.tantros-copper-overflow-duct.description = Only outputs items to the sides if the front path is blocked.

block.tantros-copper-underflow-duct.name = Copper Underflow Duct
block.tantros-copper-underflow-duct.description = Opposite of an overflow duct. Outputs to the front if the left and right paths are blocked.

block.tantros-copper-duct-unloader.name = Copper Duct Unloader
block.tantros-copper-duct-unloader.description = Unloads the selected item from the block behind it. Cannot unload from cores.

block.tantros-pneumatic-duct.name = Pneumatic Duct
block.tantros-pneumatic-duct.description = Moves items forward. Only capable of storing a single item. Maintains an inert internal environment to prevent corruption of valuable materials. Faster than a Copper Duct. Compatible with Pneumatic Pump boosters.

block.tantros-pneumatic-duct-router.name = Pneumatic Duct Router
block.tantros-pneumatic-duct-router.description = Distributes items equally across three directions. Only accepts items from the back side. Can be configured as an item sorter. Faster than a Copper Duct Router. Compatible with Pneumatic Pump boosters.

block.tantros-pneumatic-duct-bridge.name = Pneumatic Duct Bridge
block.tantros-pneumatic-duct-bridge.description = Moves items over structures and terrain.  Faster than a Copper Duct Bridge. Compatible with Pneumatic Pump boosters.

block.tantros-copper-pipeline.name = Copper Pipeline
block.conduit.description = Moves fluids forward.

block.tantros-copper-pipeline-router.name = Copper Pipeline Router
block.tantros-copper-pipeline-router.description = Distributes fluids equally across three directions. Only accepts items from the back side.

block.tantros-copper-pipeline-bridge.name = Copper Pipeline Bridge
block.tantros-copper-pipeline-bridge.description = Transports fluids over structures and terrain.


block.tantros-copper-liquid-container.name = Copper Liquid Container
block.tantros-copper-liquid-container.description = Stores a sizeable amount of fluids.


block.tantros-copper-liquid-tank.name = Copper Liquid Tank
block.tantros-copper-liquid-tank.description = Stores a large amount of fluids.


block.tantros-copper-liquid-silo.name = Copper Liquid Silo
block.tantros-copper-liquid-silo.description = Stores a massive amount of fluids.

block.tantros-graphitic-decomposer.name = Decomposition Chamber
block.tantros-graphitic-decomposer.description = Heats up materials to decompose them into simpler forms.

block.tantros-metaglass-annealer.name = Annealer
block.tantros-metaglass-annealer.description = Extrudes large, slowly cooled batches of alloys and pseudo-alloys.

block.tantros-nanostructure-weaver.name = Nanostructure Synthesizer
block.tantros-nanostructure-weaver.description = A complex factory for producing complex nanomaterials.
block.tantros-nanostructure-weaver.details = The key is assembling atoms individually in precise quantum states.

block.tantros-silicon-pressure-smelter.name = Arc Furnace
block.tantros-silicon-pressure-smelter.description = Reduces and refines material via electrical arcs.

block.tantros-sealed-electric-heater.name = Sealed Electric Heater
block.tantros-sealed-electric-heater.description = Generates heat inefficiently via electrical heater coils. Requires power.
block.tantros-sealed-electric-heater.details = Useful for improving factory efficiency, but not much else.

block.tantros-combustion-heater.name = Combustion Heater
block.tantros-combustion-heater.description = Combusts various flammable materials with :ozone: [accent]Ozone[] to produce [accent]Heat[].
block.tantros-combustion-heater.details = Key to early power systems when ozone sources are abundant.

block.tantros-hydrogen-catalysis-heater.name = Catalysis Heater (Unfinalized)
block.tantros-hydrogen-catalysis-heater.description = Thoroughly hydrogenates materials to produce heat.
block.tantros-hydrogen-catalysis-heater.details = Key to early power systems in the deep.

block.tantros-oxidization-heater.name = Oxidization Reactor (Unfinalized)
block.tantros-oxidization-heater.description = Violently oxidizes material with :ozone: [accent]Ozone[] to produce [red]:waves:[] [accent]Heat[]. Often produces byproducts.

block.tantros-electrolysis-chamber.name = Electrolysis Chamber (experimental)
block.tantros-electrolysis-chamber.description = Electrolyzes material into simpler forms. Requires [accent]:power: Power[].
block.tantros-electrolysis-chamber.details = Less efficient than electrolysis on Erekir, due to Tantros's comparatively cooler temperatures.

block.tantros-simple-boiler.name = Simple Boiler
block.tantros-simple-boiler.description = Consumes [red]:waves:[] [accent]Heat[] and :water: [accent]water[] to produce :steam-liquid: [accent]Steam[].\n\n[red]Takes damage and explodes violently if produced steam backs up into the boiler.[]
block.tantros-simple-boiler.details = I'm a little teapot...

block.tantros-silt-sifter.name = Silt Sifter
block.tantros-silt-sifter.description = Sweeps up :sand: [accent]Sand[] and other loose resources from the seabottom.

block.tantros-copper-bore.name = Copper Bore
block.tantros-copper-bore.description = Inefficiently drills wall ores at short range.
block.tantros-copper-bore.details = Little more than a copper drill facing a wall.

block.tantros-hydrothermal-tap.name = Hydrothermal Vessel (Experimental)
block.tantros-hydrothermal-tap.description = Collects :steam-liquid: [accent]Steam[] from hydrothermal vents.

block.tantros-geothermal-heater.name = Geothermal Heater (Experimental)
block.tantros-geothermal-heater.description = Generates [red]:waves:[] [accent]Heat[] when placed in hot locations.

block.tantros-deep-bore-drill.name = Deep Bore Drill (Unfinalized)
block.tantros-deep-bore-drill.description = Bores deep into the crust to find subterranean ores. Requires hydrogen to protect resources from the aquatic environment.

block.tantros-seawater-intake.name = Seawater Intake
block.tantros-seawater-intake.description = Extracts and purifies :water: [accent]Water[] from the surrounding environment.

block.tantros-effervescence-concentrator.name = Effervescence Concentrator (Deprecated)
block.tantros-effervescence-concentrator.description = Gathers dissolved gasses from aquatic environments.

block.tantros-atmosphere-projector.name = Atmosphere Projector
block.tantros-atmosphere-projector.description = Pushes back the ocean and projects an artificial atmosphere environment with inputted gas. Requires [accent]:power: Power[].
block.tantros-atmosphere-projector.details = Be aware of the range of this device. Many aquatic devices rely on the surrounding water.

block.tantros-deep-sonar.name = Deep Sonar Sensor
block.tantros-deep-sonar.description = Gradually uncovers terrain and enemy units in a large radius. Reveals underground ores and burrowing enemies. Requires [accent]:power: Power[].

block.tantros-mend-emitter.name = Mend Emitter
block.tantros-mend-emitter.description = Repairs blocks in its vicinity via both a steady, weak regen field and a periodic mend pulse. Requires [accent]:power: Power[].

block.tantros-pneumatic-pump.name = Pneumatic Pump
block.tantros-pneumatic-pump.description = Boosts Pneumatic Duct speed via pressurized :hydrogen: [accent]Hydrogen gas.[]

block.tantros-sealed-node.name = [Placeholder] Power Node
block.tantros-sealed-node.description = A placeholder power node.
block.tantros-sealed-node.details = bleh.

block.tantros-sealed-beam-node.name = Sealed Beam Node
block.tantros-sealed-beam-node.description = Transmits [accent]:power: Power[] to other blocks orthogonally. Stores a small amount of power.

block.tantros-tidal-turbine.name = Tidal Turbine
block.tantros-tidal-turbine.description = Generates [accent]:power: Power[] from the ambient ebb and flow of the tides.
block.tantros-tidal-turbine.details = An egregious waste of space. Replace this as soon as you can.

block.tantros-steam-engine.name = Steam Engine
block.tantros-steam-engine.description = Generates [accent]:power: Power[] from high pressure :steam-liquid: [accent]Steam[]. Takes time to build up speed and takes time to stop producing [accent]:power: Power[] when unsupplied.
block.tantros-steam-engine.details = Better than the tidal turbine, but not by much.

block.tantros-steam-turbine.name = [Depreciated] Small Steam Turbine
block.tantros-steam-turbine.description = Uses high pressure :steam-liquid: [accent]Steam[] input to generate [accent]:power: Power[].

block.tantros-steam-dynamo.name = Steam Dynamo
block.tantros-steam-dynamo.description = Uses high pressure :steam-liquid: [accent]Steam[] input to generate large amounts of [accent]:power: Power[].


block.tantros-core-shell.name = Core: Shell
block.tantros-core-shell.description = Core of the base. Once destroyed, the sector is lost.

block.tantros-delegate-fabricator.name = Delegate Fabricator
block.tantros-delegate-fabricator.description = Produces disposable :delegate: [accent]Delegate[] units.

block.tantros-small-frame-fabricator.name = Frame Fabricator
block.tantros-small-frame-fabricator.description = Produces Tier 1, 2, and 3 unit frames for unit assembly.


block.tantros-small-benthic-assembler.name = Benthic Assembler
block.tantros-small-benthic-assembler.description = Assembles Benthic units from Delegates and unit frames. Modules enable assembly of units up to tier 3.
block.tantros-small-benthic-assembler.details = Benthic units are bound to the seafloor, and serve as basic foot-soldiers.

block.tantros-small-sub-benthic-assembler.name = Sub-Benthic Assembler
block.tantros-small-sub-benthic-assembler.description = Assembles Sub-Benthic units from Delegates and unit frames. Modules enable assembly of units up to tier 3.
block.tantros-small-sub-benthic-assembler.details = Sub-Benthic units can burrow under the ground to remain undetected and attack at close range.

block.tantros-small-submarine-assembler.name = Submarine Assembler
block.tantros-small-submarine-assembler.description = Assembles Submarine units from Delegates and unit frames. Modules enable assembly of units up to tier 3.
block.tantros-small-submarine-assembler.details = Submarine units can rise to any depth above the surface and ignore walls and boundaries.

block.tantros-sealed-payload-conveyor.name = Sealed Payload Conveyor
block.tantros-sealed-payload-conveyor.description = Moves Payloads forward. Seals protect payloads from external environments.

block.tantros-bident.name = Bident
block.tantros-bident.description = Fires alternating bullets at enemies.
block.tantros-bident.details = A modified Duo turret. Despite attempts to adapt it to Tantros, the drag of aquatic environments hampers its effectiveness.\n\nIn Duo We Trust

block.tantros-puncture.name = Puncture
block.tantros-puncture.description = Fires piercing bullets at enemy targets.
block.tantros-puncture.details = A modified Breach turret. Adaptations to aquatic environments were largely successful, allowing for reduced footprint. Suffers the same aquatic drag as other projectile turrets.

block.tantros-lob.name = Lob
block.tantros-lob.description = Flings compacted solids at enemies.
block.tantros-lob.details = Nothing like flinging sand into your enemy's eyes.

unit.tantros-enact.name = Enact
unit.tantros-enact.description = Poorly adapted but submersible core unit.
unit.tantros-enact.detail = Poorly adapted is an understatement. So.... Slow....

unit.tantros-delegate.name = Delegate
unit.tantros-delegate.description = Inefficient. Cheap. Expendable. Can be built upon to assemble assault units, or just used for labor.
unit.tantros-delegate.details = Designs show great effort was made to maximize unit intelligence. These attempts were apparently fruitless. We can do better.

block.tantros-delegate-frame.name = Delegate Frame
block.tantros-delegate-frame.description = Frame for building  :delegate: [accent]Delegate[] units. Wait... that can't be right.

unit.tantros-flak.name = Flak
unit.tantros-flak.description = A hydrodynamic mech built for sprinting past enemy lines.
unit.tantros-flak.details = A grand plagiarism of the Dagger. The standard armor and armament were removed to improve maneuverability.

block.tantros-flak-frame.name = Flak Frame
block.tantros-flak-frame.description = Frame for building Flak units.

unit.tantros-sherd.name = Sherd
unit.tantros-sherd.description = Sturdy mech firing shrapnel shot.
unit.tantros-sherd.details = Four legs proved more effective at keeping the unit upright at the cost of maneuverability.

block.tantros-sherd-frame.name = Sherd Frame
block.tantros-sherd-frame.description = Frame for building Sherd units.

unit.tantros-fractoid.name = Fractoid
unit.tantros-fractoid.description = Sturdy mech/walker TODO.
unit.tantros-fractoid.details = A significant improvement on the sherd design. Mere walls won't stand in the way of conquest.

block.tantros-fractoid-frame.name = Fractoid Frame
block.tantros-fractoid-frame.description = Frame for building Fractoid units.

unit.tantros-roach.name = Roach
unit.tantros-roach.description = A stealthy unit capable of burrowing to avoid enemy detection. Moves toward enemy targets and self-destructs, causing a large explosion.
unit.tantros-roach.details = A novel concept. The Roach head is fitted with a mis-designed torch that backfires in a destructively efficient explosion.

block.tantros-roach-frame = Roach Frame
block.tantros-roach-frame.description = Frame for building Roach units.

unit.tantros-infest.name = Infest
unit.tantros-infest.description = A stealthy unit capable of burrowing to avoid enemy detection. Moves toward enemy targets and dissects them with a plasma torch at close range.
unit.tantros-infest.details = A perfected Roach, no longer requiring self-destruction to achieve conquest. Early designs featured self-reproduction, but this was scrapped when populations grew out of control.

block.tantros-infest-frame.name = Infest Frame
block.tantros-infest-frame.description = Frame for building Infest units.

unit.tantros-invade.name = Invade
unit.tantros-invade.description = A stealthy unit capable of burrowing to avoid enemy detection. Moves toward enemy targets and blasts them with a twin, piercing lasers at close range.
unit.tantros-invade.details = Larger head section allows for increased durability and support. The unique body plan was inspired by Tantros native species.

block.tantros-invade-frame.name = Invade Frame
block.tantros-invade-frame.description = Frame for building Invade units.

unit.tantros-skim.name = Skim
unit.tantros-skim.description = A lighter-than-water unit floats above the seafloor. Damages ground targets with a point laser.
unit.tantros-skim.details = A poorly adapted mono. The traditional mining laser design relied heavily on air, and incinerates ores under the ocean; an entirely new design was necessary for that task.\nIn conquest, one task's failure is another task's laser cutter.

block.tantros-skim-frame = Skim Frame
block.tantros-skim-frame.description = Frame for building Skim units.


command.tantros-groundRepairCommand = Repair
command.tantros-groundMineCommand = Mine
command.tantros-groundRebuildCommand = Rebuild
command.tantros-groundAssistCommand = Assist


team.blue.name = Archae


sector.tantros-embark.name = Embark
sector.tantros-embark.description = The site selected for splashdown of the :sharded:[accent]Sharded[] conquest of Tantros.\n\nResearch the basics, and master them.

embark.teachCopper = :copper: [accent]Copper[] is your most basic resource.\nIt forms the basis of nearly everything you can build.\n\nAs such, you must find deposits to mine.\nUse [accent][[WASD] to move.
embark.teachCopper.mobile = :copper: [accent]Copper[] is your most basic resource.\nIt forms the basis of nearly everything you can build.\n\nAs such, you must find deposits to mine.\nDrag the screen to move.
embark.mineCopper = This is copper ore in a wall.\n\nClick it to mine :copper: [accent]Copper[].
embark.mineCopper.mobile = This is copper ore in a wall.\n\nTap it to mine :copper: [accent]Copper[].
embark.teachBore = It will not do to spend all your time mining.\n\nResearch and place a :copper-bore: [accent]Copper Bore[] to mine for you.
embark.researchBore = Open the :tree: tech tree.\nResearch, then place a :copper-bore: [accent]Copper Bore[] against the wall ore.\nThis automatically mines resources from walls.
embark.teachDuct = Research and place :copper-duct: [accent]Copper Ducts[] to move the mined resources from the :copper-bore: [accent]Copper Bore[] to the core.\n\nClick and drag to place multiple ducts.\n[accent]Scroll[] to rotate.
embark.teachDuct.mobile = Research and place :copper-duct: [accent]Copper Ducts[] to move the mined resources\nfrom drills to the core.\n\nHold down your finger for a second and drag to place multiple ducts.

embark.announceWaves = Your arrival has not gone unnoticed.\nThe :archae: [blue]Archae[] have sent a 5 wave scouting party to investigate your arrival and destroy your core.\n[red]Top priority should be survival[].\nHead further up to find a good spot to defend yourself.
embark.teachWalls = This pass should be a good place to set up defenses.\n\nResearch and place :copper-bulkhead: [accent]Copper Bulkheads[] from wall to wall\non each path in the fork to prevent the enemy from getting to your core.
embark.teachDefense = Next, we must destroy the enemies before they breach the walls.\n:bident: [accent]Bidents[] are turrets that automatically fire bullets\nat units, so long as they have ammo.\n\nResearch and place :bident: [accent]Bidents[] along the inside of your walls,\nand feed :copper: [accent]Copper[] into them with ducts and duct routers.
embark.pointToAmmo = :copper: [accent]Copper[] from this deposit can act as ammo for your turrets.
embark.teachRepair = Here they come!\nAs each wave comes to your walls, it will take damage from their bullets\nYou can repair damaged walls by holding [accent]Left Click[] on them, and you can rebuild destroyed buildings by\nselecting where they used to be via the [accent]B key[].\n\n Make sure to build up your defenses! Each wave is stronger than the last.
embark.teachRepair.mobile = Here they come!\nAs each wave comes to your walls, it will take damage from their bullets\nYou can repair damaged walls by holding you finger on them, and you can rebuild destroyed buildings by\nselecting where they used to be with the :copy: copy button into the :wrench: rebuild repair option selected.\n\n Make sure to build up your defenses! Each wave is stronger than the last.

embark.teachOxide = On its own, :copper: [accent]Copper[] is weak and cannot support large structures.\nScans suggest there should be :oxide: [accent]Oxide[] in this sector,\nwhich can support and protect larger buildings.\n\nFind deposits to mine.
embark.mineOxide = This wall has oxide in it.\n\nUse bores to mine the :oxide: [accent]Oxide[].\nUse ducts to feed it into the core.
embark.coreTile = This is a [accent]Core Zone[].\nIf you have the :copper: [accent]Copper[] and :oxide: [accent]Oxide[] for it, you can build an extra :core-shell: [accent]Core Shell[] here.\n\nAdditional cores increase resource capacity, and act as resource collection posts.\n[red]Enemies will attempt to destroy cores.[]

embark.prepareForBattle = Seems like another attacking force is on its way.\nEstimates suggest it will be another 5-10 waves; best to prepare for the worst.\n\nPrepare for the incoming waves.\n\n[accent]Hint: Bidents deal more damage when firing oxide rather than copper.[]
embark.prepareTimer = [accent]Time left to prepare: [lightgray]{0}


sector.tantros-shallows.name = Shallows
sector.tantros-shallows.description = A sandy plateau rich in Lead deposits.\nHarvest the Lead. Research and produce Metaglass.

shallows.teachLead = Scans indicate :lead: [accent]Lead[] in this area.\nIt is an inert, dense metal, useful for making watertight seals and power infrastructure.\n[accent]Mine these deposits.[]
shallows.mineLead = This is lead ore in a wall.\n\nUse bores to mine the :lead: [accent]Lead[].\nUse ducts to feed it into the core.
shallows.teachMetaglass = Lead unlocks new possibilities, though it only gets more complicated from here.\nMetaglass is a lightweight, inert material used in liquid transport in other environments,\nand is critical to keep seawater at bay on Tantros.\n\nResearch and place an :annealer: [accent]Annealer[].\nRoute :lead: [accent]Lead[] into the :annealer: [accent]Annealer[] with ducts.
shallows.teachSand = Metaglass requires :lead: [accent]Lead[] and :sand: [accent]Sand[].\nTo obtain sand, you must use :silt-sifter: [accent]Silt Sifters[] to harvest it from sandy seafloors.
shallows.siftSand = This is a sand deposit. Sifters can dredge up :sand: [accent]Sand[] from it.\n\nResearch and place :silt-sifter: [accent]Silt Sifters[] to gather sand.\nUse ducts to feed it into the Annealer.
shallows.teachPower = The annealer needs [accent]Power[] to melt the lead and sand. To make that power, you need a power source.\nThankfully, the slow movements of the sea itself can power your devices (albeit inefficiently) using a :tidal-turbine: [accent]Tidal Turbine[].\n\nResearch and place three :tidal-turbine: [accent]Tidal Turbines[].\n[Note] Tidal Turbines are large structures, make sure you have the room to place them.
shallows.teachPowerNode = Now that you have a turbine built, you need to connect it to the annealer via beam nodes.\n:sealed-beam-node: [accent]Sealed Beam Nodes[] will automatically connect to buildings (including other nodes) in range and transmit power from power sources.\n\nResearch and place :sealed-beam-node: [accent]Sealed Beam Nodes[] to form a line leading from the turbine to the annealer.
shallows.moveMetaglass = Like for other items, you cannot build with the metaglass until its in the core.\n\nMove produced :metaglass: [accent]Metaglass[] into the core with ducts.

sector.tantros-polar-edge.name = Polar Edge
sector.tantros-polar-edge.description = A region of sandy plains in cold waters. This region is low in oxygen, where Bluecyst thrives.\n\n[red]These plains contain seismic oddities. Be wary, all is not as it seems.[]\n\nHarvest the Bluecyst. Research Silicon and Sonar tech.
polar-edge.mission = There are strange tectonic readings in this area.\nThey aren't strong, so finding the source is difficult.\n\nMore info to come: start working towards :silicon: [accent]Silicon[] production.
polar-edge.place-smelter = :silicon: [accent]Silicon[] is needed for advanced processing, field emitter tools, and unit production; it\n is crucial for conquest.\n\nResearch and place an :arc-furnace: [accent]Arc Furnace[].
polar-edge.silicon.feedSand = Sand is one of the required ingredients to produce silicon.\n\nCollect it and move it into the smelter using ducts.
polar-edge.silicon.feedBluecyst = Unlike Serpulo and Erekir, Tantros has no native, large scale carbon sources. However, the synthetic :redcyst: [accent]Redcyst[]\nand :bluecyst: [accent]Bluecyst[] organisms seem designed to fulfill the role.\n\nUse :silt-sifter: Silt Sifters to harvest :bluecyst: [accent]Bluecyst[], and move\nit into the smelter using ducts.
polar-edge.silicon.produce = Move the :silicon: [accent]Silicon[] into the core using ducts.
polar-edge.mission.investigate = The source of disturbance has been located.\n[accent]Investigate it.[]
polar-edge.mission.source = [red]Disturbance Detected[]
polar-edge.mission.sonar = The readings are coming from this area. Research and build a :deep-sonar: [accent]Deep Sonar[] tower here to study it.\n\n[accent]Hint: You will need to power it.[]
polar-edge.mission.enemies = The deep sonar tower has detected enemy units buried in the ground.\n\n[red]They can only be targeted by turrets when in range of active []:deep-sonar:[red] Deep Sonar towers[].\n\nDestroy them now before they begin moving towards your core!\n\nPrepare defenses for these and the dropzone units.\nEnsure that all points of attack are covered by sonar towers.
polar-edge.waves.timer = Enemies awakening in: {0}

sector.tantros-patrol-outpost.name = Patrol Outpost
sector.tantros-patrol-outpost.description = In these temperate waters lies the source of the unit patrol assaults from the last few sectors.\n\nThe enemy's defenses were poorly built in many places. Research units. Exploit weaknesses in the enemy's defenses.\n\n[red]Do not underestimate the enemy. They possess formidable strategy and more advanced tech.\nBuild new cores as soon you can, and do not leave paths to infrastructure exposed.[]
patrol-outpost.delegate-fabricator-place = The :delegate: [accent]Delegate[] unit is the basis of all simple units.\n\nResearch and place a\n:delegate-fabricator: [accent] Delegate Fabricator[] here, facing the indicated direction.
patrol-outpost.frame-fabricator-place = Each :delegate: [accent]Delegate[] must be combined with a Unit Frame to grant it access to weapons.\n\nResearch and place a :frame-fabricator: [accent] Frame Fabricator[] here, facing the indicated direction.
patrol-outpost.benthic-assembler-place = Unit assembly takes place via the :benthic-assembler: [accent]Benthic Assembler[].\n it will combine the :delegate: [accent]Delegate[] and :flak-frame: [accent]Flak Frame[]\ninto a :flak: [accent]Flak[] unit.\n\nResearch and place a :benthic-assembler: [accent]Benthic Assembler[] here, facing the indicated direction.
patrol-outpost.payload-conveyor-place = :sealed-payload-conveyors: [accent]Sealed Payload Conveyors[] can move payloads such as units and frames like a duct does items.\n\n Research and place two :sealed-payload-conveyors: [accent]Sealed Payload Conveyors[] in the indicated locations,\nfacing into the :benthic-assembler: [accent]Benthic Assembler[].
patrol-outpost.supply-factories = Use :copper-duct: [accent]Copper Ducts[] to feed these outputs into the respective factories.
patrol-outpost.supply-factories.hint = The :frame-fabricator: [accent]Frame Fabricator[] must be configured to fabricate :flak-frame: [accent]Flak Frames[].\n\n Click it to configure it.
patrol-outpost.supply-factories.hint.mobile = The :frame-fabricator: [accent]Frame Fabricator[] must be configured to fabricate :flak-frame: [accent]Flak Frames[].\n\n Tap it to configure it.
patrol-outpost.sprint-past = :flak: [accent]Flak[] units are very fast, as you know.\nThe enemy has left a hole for their units to walk through: your :flak: [accent]Flaks[] can\nsprint past before the turrets can destroy them.\n\nEnter command mode by holding [accent]Shift[], select the :flak: [accent]Flak[] units\nby clicking on them, and right click a destination on the other side of the wall to send them there.
patrol-outpost.sprint-past.mobile = :flak: [accent]Flak[] units are very fast, as you know.\nThe enemy has left a hole for their units to walk through: your :flak: [accent]Flaks[] can\nsprint past before the turrets can destroy them.\n\nEnter command mode by clicking the [accent]Command[] button, select the :flak: [accent]Flak[] units\nby tapping on them, and tap a destination on the other side of the wall to send them there.
patrol-outpost.blow-the-steam = The enemy seems to have discovered uses for :steam-liquid: [accent]Steam[],\nbut left a highly pressurized silo of it exposed. Once it is full of :steam-liquid: [accent]Steam[], target this silo with your units\nand their whole defense should crumble.\n\n[accent]While in command mode with units selected, right click on the silo to instruct your units to target it.[]
patrol-outpost.blow-the-steam.mobile = The enemy seems to have discovered uses for :steam-liquid: [accent]Steam[],\nbut left a highly pressurized silo of it exposed.  Once it is full of :steam-liquid: [accent]Steam[], target this silo with your units\nand their whole defense should crumble.\n\n[accent]While in command mode with units selected, tap on the silo to instruct your units to target it.[]

patrol-outpost.prepare.timer = [accent]Prepare New Base: [lightgray]{0}