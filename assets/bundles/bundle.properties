error.tantros-metaglass-annealing.name = Metaglass Annealing
error.tantros-metaglass-annealing.description = The process by which :sand: [accent]Sand[] and :lead: [accent]Lead[] is melted down, mixed, and cooled slowly into large sheets of :metaglass: [accent]Metaglass[].

error.tantros-surge-annealing.name = Surge Annealing
error.tantros-surge-annealing.description = The process by which :copper: [accent]Copper[], :lead: [accent]Lead[], :titanium: [accent]Titanium[], and :silicon: [accent]Silicon[] is melted down, mixed, and cooled slowly in large :surge-alloy: [accent]Surge Alloy[] sheets.
error.tantros-surge-annealing.details = As seen on Serpulo

error.tantros-slag-surge-annealing.name = Slag Surge Annealing
error.tantros-slag-surge-annealing.description = The process by which :silicon: [accent]Silicon[] is melted down, mixed with :slag: [accent]Slag[], and cooled slowly in large :surge-alloy: [accent]Surge Alloy[] sheets.
error.tantros-slag-surge-annealing.details = As seen on Erekir

error.tantros-coal-decomposition.name = Coal Decomposition
error.tantros-coal-decomposition.description = The process by which coal is heated until it breaks down into graphite and hydrogen gas.

error.tantros-silicon-pressure-smelting.name = Pressurized Silicon Arc Smelting

error.tantros-coal-combustion.name = Coal Combustion

error.tantros-hydrogen-combustion.name = Hydrogen Combustion

error.tantros-electric-heating.name = Electric Heating
error.tantros-electric-heating.description = The process by which [accent]:power: Power[] is dumped entirely into [red]:waves:[] [accent]Heat[]
error.tantros-electric-heating.details = If you can believe it, this process is 100% efficient. Your power grid will disagree, however.

error.tantros-silicon-weaving.name = Silicon Weave Reduction
error.tantros-silicon-weaving.description = The process by which :sand: [accent]Sand[] is forcefully reduced via molecular disassembly and weaved in the presence of :hydrogen: [accent]Hydrogen[] gas to produce large quantities of highly pure :silicon: [accent]Silicon[].
error.tantros-silicon-weaving.details = The key to high purity is nanomachining.

error.tantros-phase-weaving.name = Phase Fabric Synthesis
error.tantros-phase-weaving.description = The process by which the atoms in :ozone: [accent]Ozone[], sand, and thorium are nanoscopically weaved into a highly quantized and carefully doped thorosilicate lattice known as Phase Fabric.
error.tantros-phase-weaving.details = Put just the right particles in just the right places, and the laws of physics bend to your whim.

